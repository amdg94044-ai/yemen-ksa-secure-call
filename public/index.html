<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- السماح بالتكبير الحر بالإصبع دون أي قيود من المتصفح -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اتصال آمن ومباشر</title>
    <style>
        /* إعادة ضبط عامة مرنة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* إلغاء الـ height: 100vh والـ overflow: hidden تمامًا لفتح قفل الشاشة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: block; /* تغيير من flex إلى block للسماح بالتحرك الطبيعي لأسفل */
            min-height: 100vh;
            overflow-y: auto !important; /* إجبار المتصفح على تفعيل التمرير العمودي */
            overflow-x: auto !important; /* إجبار المتصفح على تفعيل التمرير الأفقي عند التكبير */
            -webkit-overflow-scrolling: touch; /* تحسين سلاسة التحريك على أجهزة آيفون وأندرويد */
        }

        header {
            background-color: #1f1f1f;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #292929;
            position: sticky; /* يبقى في الأعلى أثناء التحريك دون أن يحجب المحتوى */
            top: 0;
            z-index: 100;
        }

        #status-message {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            margin: 15px auto;
            width: fit-content;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        /* تحويل شبكة الفيديو إلى حاوية مرنة تترتب عموديًا على الجوال لمنع التداخل */
        #video-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            width: 100%;
        }

        /* تنسيق الفيديو ليكون مرنًا وقابلًا للتكبير دون الخروج عن السيطرة */
        video {
            width: 100%;
            max-width: 500px; /* أقصى عرض مريح للشاشة */
            height: auto; /* ترك الارتفاع يتحدد تلقائيًا لمنع التمدد المربك */
            aspect-ratio: 4 / 3; /* تثبيت أبعاد البث الاقتصادية */
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            transform: scaleX(-1); 
        }

        #remote-video {
            transform: none; 
        }

        /* أزرار التحكم متموضعة بشكل طبيعي في الأسفل وتتحرك مع تمرير الشاشة */
        #controls {
            background-color: #1f1f1f;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* السماح للأزرار بالنزول لسطر جديد إذا كبّرت الشاشة */
            gap: 15px;
            border-top: 2px solid #292929;
            margin-top: 30px;
            width: 100%;
        }

        .btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #b81d24;
        }

        .btn-mute {
            background-color: #333333;
        }
    </style>
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <header>🔒 اتصال مباشر آمن ومستقل</header>
    
    <div id="status-message">جاري تجهيز الاتصال المحلي...</div>

    <div id="video-grid">
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <button id="toggle-mic" class="btn btn-mute">كتم الصوت</button>
        <button id="toggle-video" class="btn btn-mute">إيقاف الكاميرا</button>
        <button id="end-call" class="btn">إنهاء المكالمة</button>
    </div>

</body>
</html>
