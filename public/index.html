<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصال فيديو آمن</title>

    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>

<header class="header">

    <h1>📹 اتصال فيديو آمن</h1>

    <p>تصميم أمين النزيلي</p>

</header>


<div class="status">

    <span id="status">
        جاري تجهيز الكاميرا...
    </span>

</div>


<main class="container">

    <div class="video-card">

        <h3>📷 أنت</h3>

        <video
            id="local-video"
            autoplay
            playsinline
            muted>
        </video>

    </div>


    <div class="video-card">

        <h3>👤 الطرف الآخر</h3>

        <video
            id="remote-video"
            autoplay
            playsinline>
        </video>

    </div>

</main>


<section class="controls">

    <button id="micBtn">
        🎤 كتم الميكروفون
    </button>

    <button id="cameraBtn">
        📷 إيقاف الكاميرا
    </button>

    <button id="screenBtn">
        🖥️ مشاركة الشاشة
    </button>

    <button id="fullBtn">
        ⛶ ملء الشاشة
    </button>

    <button id="endBtn" class="danger">
        📞 إنهاء المكالمة
    </button>

</section>


<section class="chat">

    <h2>💬 المحادثة</h2>

    <div id="messages"></div>

    <div class="send-box">

        <input
            type="text"
            id="messageInput"
            placeholder="اكتب رسالتك">

        <button id="sendBtn">
            إرسال
        </button>

    </div>

</section>


<footer>

    <p>
        © 2026 جميع الحقوق محفوظة
    </p>

    <strong>
        تصميم أمين النزيلي
    </strong>

</footer>

</body>

</html>
