<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>اتصال فيديو آمن</title>

    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js" defer></script>

    <script src="script.js" defer></script>

</head>

<body>

<header class="header">

    <div class="header-content">

        <h1>📹 اتصال فيديو آمن</h1>

        <p>تصميم وتطوير أمين النزيلي</p>

    </div>

</header>


<main class="main-container">

    <div class="status-bar">

        <span id="status">
            جاري تجهيز الكاميرا...
        </span>

    </div>


    <section class="video-grid">

        <div class="video-card">

            <div class="video-title">
                📷 أنت
            </div>

            <video
                id="local-video"
                autoplay
                muted
                playsinline>
            </video>

        </div>


        <div class="video-card">

            <div class="video-title">
                👤 الطرف الآخر
            </div>

            <video
                id="remote-video"
                autoplay
                playsinline>
            </video>

        </div>

    </section>


    <section class="controls">

        <button id="micBtn">
            🎤 كتم الميكروفون
        </button>

        <button id="cameraBtn">
            📷 إيقاف الكاميرا
        </button>

        <button id="screenBtn">
            🖥️ مشاركة الشاشة
        </button>

        <button id="fullBtn">
            ⛶ تكبير الشاشة
        </button>

        <button id="endBtn" class="danger">
            📞 إنهاء المكالمة
        </button>

    </section>


    <section class="chat-box">

        <h2>
            💬 المحادثة
        </h2>

        <div id="messages">

        </div>

        <div class="chat-input">

            <input
                id="messageInput"
                type="text"
                placeholder="اكتب رسالتك هنا">

            <button id="sendBtn">

                إرسال

            </button>

        </div>

    </section>

</main>


<footer>

    <p>

        © 2026 جميع الحقوق محفوظة

    </p>

    <p>

        تصميم أمين النزيلي

    </p>

</footer>

</body>

</html>
