<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- السماح بالتكبير الحر بالإصبع دون أي قيود من المتصفح -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تصميم أمين النزيلي | اتصال آمن</title>
    
    <style>
        #chat-container{
            width:95%;
            max-width:700px;
            margin:30px auto;
            background:#1b1b1b;
            border:2px solid #FFD700;
            border-radius:15px;
            padding:15px;
        }

        #chat-container h3{
            text-align:center;
            color:#FFD700;
            margin-bottom:15px;
        }

        #chat-messages{
            height:220px;
            background:#111;
            border-radius:10px;
            overflow-y:auto;
            padding:10px;
            margin-bottom:15px;
        }

        .chat-input{
            display:flex;
            gap:10px;
        }

        .chat-input input{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .message{
            background:#198754;
            color:#fff;
            padding:10px;
            border-radius:10px;
            margin-bottom:8px;
        }

        video:hover{
            transform:scale(1.02);
            transition:.3s;
        }

        .btn{
            box-shadow:0 5px 15px rgba(0,0,0,.4);
        }

        .btn:active{
            transform:scale(.96);
        }

        #remote-video:fullscreen{
            width:100vw;
            height:100vh;
            object-fit:cover;
            background:black;
        }

        .footer{
            text-align:center;
            padding:20px;
            color:#FFD700;
        }

        .footer hr{
            border:1px solid #333;
            margin-bottom:15px;
        }

        header{
            background:linear-gradient(135deg,#0f5132,#146c43,#198754);
            padding:25px;
            text-align:center;
            border-bottom:3px solid #FFD700;
            box-shadow:0 4px 15px rgba(0,0,0,.4);
            position:sticky;
            top:0;
            z-index:100;
        }

        header p{
            color:#FFD700;
            font-size:16px;
            margin-bottom:8px;
            font-weight:bold;
        }

        header h2{
            font-size:30px;
            color:white;
            margin-bottom:8px;
        }

        header small{
            color:#d9d9d9;
            font-size:15px;
        }

        #remote-video:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            background: black;
        }

        /* إعادة ضبط عامة مرنة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* تفعيل التمرير الحر والكامل عمودياً وأفقياً عند التكبير */
        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:linear-gradient(180deg,#121212,#1b1b1b,#222);
            color:#fff;
            display:block;
            min-height:100vh;
            overflow-y:auto !important;
            overflow-x:auto !important;
            -webkit-overflow-scrolling:touch;
        }

        #status-message {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            margin: 15px auto;
            width: fit-content;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        /* حاوية مرنة تترتب عمودياً لتسهيل سحب الشاشة وتحريكها */
        #video-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            width: 100%;
        }
        
        .video-name{
            color:#FFD700;
            font-size:18px;
            font-weight:bold;
            margin-bottom:8px;
        }

        /* التعديل الجوهري لتطابق الشاشة وملء الإطار */
        video {
    width: 100%;
    max-width: 450px;
    aspect-ratio: 4 / 3; /* جعل الإطار أطول عمودياً ليناسب تصوير الجوال */
    object-fit: cover;   /* يملأ الإطار بدون حواف سوداء وبدون زوم شديد */
    border-radius: 18px;
    border: 3px solid #FFD700;
    background: #000;
    box-shadow: 0 0 25px rgba(255, 215, 0, .25);
}

        #local-video {
            transform: scaleX(-1); /* ميزة المرآة لكاميرتك المحلية */
        }

        #remote-video {
            transform: none; /* فيديو الطرف الآخر */
        }

        /* أزرار التحكم تتحرك بشكل طبيعي في أسفل المحتوى وتدعم التكبير */
        #controls {
            background-color: #1f1f1f;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 15px;
            border-top: 2px solid #292929;
            margin-top: 30px;
            width: 100%;
        }

        .btn{
            background:#198754;
            color:#fff;
            border:none;
            padding:14px 24px;
            border-radius:40px;
            font-size:16px;
            transition:.3s;
        }

        .btn:hover{
            transform:scale(1.05);
            background:#157347;
        }

        #end-call{
            background:#dc3545;
        }

        #end-call:hover{
            background:#bb2d3b;
        }

        .btn-mute{
            background:#555;
        }

        .btn-mute:hover{
            background:#777;
        }
    </style>
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <p>اللهم صلِّ وسلم وبارك على نبينا محمد ﷺ</p>
        <h2>📹  تصميم أمين النزيلي</h2>
        <small>تواصل بثقة... واتصل بأمان.</small>
    </header>

    <div id="status-message">جاري تجهيز الاتصال المحلي...</div>

    <div id="video-grid">
        <p class="video-name">📹 أنت</p>
        <video id="local-video" autoplay playsinline muted></video>

        <p class="video-name">👤 الطرف الآخر</p>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="controls">
    <button id="toggle-mic" class="btn btn-mute">🎤 كتم الصوت</button>
    <button id="toggle-video" class="btn btn-mute">📷 إيقاف الكاميرا</button>
    
    <!-- 🔄 أضف هذا الزر الجديد هنا -->
    <button id="switch-camera" class="btn btn-mute">🔄 تبديل الكاميرا</button>

    <button id="fullscreen-remote" class="btn">🖥️ تكبير الشاشة</button>
    <button id="end-call" class="btn">📞 إنهاء المكالمة</button>
</div>

    <div id="chat-container">
        <h3>💬 الرسائل</h3>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="اكتب رسالتك...">
            <button id="send-message" class="btn">إرسال</button>
        </div>
    </div>

    <footer class="footer">
        <hr>
        <p>🇾🇪 تصميم وتطوير: <strong>أمين النزيلي</strong></p>
        <small>© 2026 جميع الحقوق محفوظة</small>
    </footer>

</body>
</html>
