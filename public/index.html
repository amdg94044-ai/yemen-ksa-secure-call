<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- السماح بالتكبير الحر بالإصبع دون أي قيود من المتصفح -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تصميم أمين النزيلي | اتصال آمن</title>
    
    <style>
        /* إعادة ضبط عامة مرنة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #121212, #1b1b1b, #222);
            color: #fff;
            display: block;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch;
        }

        /* الهيدر */
        header {
            background: linear-gradient(135deg, #0f5132, #146c43, #198754);
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #FFD700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header p {
            color: #FFD700;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        header h2 {
            font-size: 30px;
            color: white;
            margin-bottom: 8px;
        }

        header small {
            color: #d9d9d9;
            font-size: 15px;
        }

        /* حالة الاتصال */
        #status-message {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            margin: 20px auto;
            width: fit-content;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        /* شبكة الفيديو المحدثة - أبعاد متناسقة دون تمطيط */
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 25px;
            padding: 10px 20px;
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .video-name {
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* نسبة العرض إلى الارتفاع الطبيعية (16:9) للحفاظ على تناسق الأبعاد */
        video {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            border: 3px solid #FFD700;
            background: #000;
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        video:hover {
            transform: scale(1.02);
            border-color: #4A90E2;
        }

        #local-video {
            transform: scaleX(-1); /* مرآة للكاميرا المحلية */
        }

        #local-video:hover {
            transform: scaleX(-1) scale(1.02);
        }

        #remote-video {
            transform: none;
        }

        /* أزرار التحكم */
        #controls {
            background-color: #1f1f1f;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 2px solid #292929;
            margin-top: 30px;
            width: 100%;
        }

        .btn {
            background: #198754;
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .4);
            transition: .3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #157347;
        }

        .btn:active {
            transform: scale(.96);
        }

        #end-call {
            background: #dc3545;
        }

        #end-call:hover {
            background: #bb2d3b;
        }

        .btn-mute {
            background: #555;
        }

        .btn-mute:hover {
            background: #777;
        }

        /* الشات */
        #chat-container {
            width: 95%;
            max-width: 700px;
            margin: 30px auto;
            background: #1b1b1b;
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 15px;
        }

        #chat-container h3 {
            text-align: center;
            color: #FFD700;
            margin-bottom: 15px;
        }

        #chat-messages {
            height: 220px;
            background: #111;
            border-radius: 10px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 15px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .message {
            background: #198754;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        /* ملء الشاشة */
        #remote-video:fullscreen,
        #remote-video:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            max-height: 100vh;
            object-fit: cover;
            background: black;
            border: none;
            border-radius: 0;
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 20px;
            color: #FFD700;
        }

        .footer hr {
            border: 1px solid #333;
            margin-bottom: 15px;
        }
    </style>

    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <p>اللهم صلِّ وسلم وبارك على نبينا محمد ﷺ</p>
        <h2>📹 تصميم أمين النزيلي</h2>
        <small>تواصل بثقة... واتصل بأمان.</small>
    </header>

    <div id="status-message">جاري تجهيز الاتصال المحلي...</div>

    <div id="video-grid">
        <div class="video-box">
            <p class="video-name">📹 أنت</p>
            <video id="local-video" autoplay playsinline muted></video>
        </div>

        <div class="video-box">
            <p class="video-name">👤 الطرف الآخر</p>
            <video id="remote-video" autoplay playsinline></video>
        </div>
    </div>

    <div id="controls">
        <button id="toggle-mic" class="btn btn-mute">🎤 كتم الصوت</button>
        <button id="toggle-video" class="btn btn-mute">📷 إيقاف الكاميرا</button>
        <button id="fullscreen-remote" class="btn">🖥️ تكبير الشاشة</button>
        <button id="end-call" class="btn">📞 إنهاء المكالمة</button>
    </div>

    <div id="chat-container">
        <h3>💬 الرسائل</h3>
        <div id="chat-messages"></div>

        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="اكتب رسالتك...">
            <button id="send-message" class="btn">إرسال</button>
        </div>
    </div>

    <footer class="footer">
        <hr>
        <p>🇾🇪 تصميم وتطوير: <strong>أمين النزيلي</strong></p>
        <small>© 2026 جميع الحقوق محفوظة</small>
    </footer>

</body>
</html>
