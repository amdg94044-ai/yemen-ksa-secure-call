<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تصميم أمين النزيلي | اتصال آمن</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #121212, #1b1b1b, #222);
            color: #fff;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch;
        }

        header {
            background: linear-gradient(135deg, #0f5132, #146c43, #198754);
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #FFD700;
            box-shadow: 0 4px 15px rgba(0,0,0,.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header p {
            color: #FFD700;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        header h2 {
            font-size: 30px;
            color: white;
            margin-bottom: 8px;
        }

        header small {
            color: #d9d9d9;
            font-size: 15px;
        }

        /* شريط دخول الغرفة بالرقم */
        #room-section {
            background: #1b1b1b;
            border: 2px solid #FFD700;
            border-radius: 15px;
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
            text-align: center;
        }

        .room-box {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .room-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111;
            color: #FFD700;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            outline: none;
        }

        #status-message {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            margin: 15px auto;
            width: fit-content;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        #video-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            width: 100%;
        }
        
        .video-name {
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        video {
            width: 100%;
            max-width: 450px;
            height: 450px;
            object-fit: cover;
            border-radius: 18px;
            border: 3px solid #FFD700;
            background: #000;
            box-shadow: 0 0 25px rgba(255, 215, 0, .25);
        }

        #local-video {
            transform: scaleX(-1);
        }

        #remote-video {
            transform: none;
        }

        #controls {
            background-color: #1f1f1f;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 15px;
            border-top: 2px solid #292929;
            margin-top: 30px;
            width: 100%;
        }

        .btn {
            background: #198754;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 5px 15px rgba(0,0,0,.4);
        }

        .btn:hover {
            transform: scale(1.05);
            background: #157347;
        }

        .btn:active {
            transform: scale(.96);
        }

        #end-call {
            background: #dc3545;
        }

        #end-call:hover {
            background: #bb2d3b;
        }

        .btn-mute {
            background: #555;
        }

        .btn-mute:hover {
            background: #777;
        }

        #chat-container {
            width: 95%;
            max-width: 700px;
            margin: 30px auto;
            background: #1b1b1b;
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 15px;
        }

        #chat-container h3 {
            text-align: center;
            color: #FFD700;
            margin-bottom: 15px;
        }

        #chat-messages {
            height: 220px;
            background: #111;
            border-radius: 10px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 15px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #FFD700;
        }

        .footer hr {
            border: 1px solid #333;
            margin-bottom: 15px;
        }
    </style>
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <p>اللهم صلِّ وسلم وبارك على نبينا محمد ﷺ</p>
        <h2>📹 تصميم أمين النزيلي</h2>
        <small>تواصل بثقة... واتصل بأمان.</small>
    </header>

    <!-- 🔑 قسم إدخال رقم الغرفة -->
    <div id="room-section">
        <p style="color:#FFD700; font-weight:bold;">🔑 رقم الغرفة الحالية: <span id="current-room-id" style="color:#fff;">----</span></p>
        <div class="room-box">
            <input type="number" id="room-id-input" placeholder="أدخل رقم الغرفة للانضمام">
            <button onclick="joinRoomByNumber()" class="btn">دخول الغرفة 🚪</button>
        </div>
    </div>

    <div id="status-message">جاري تجهيز الاتصال المحلي...</div>

    <div id="video-grid">
        <p class="video-name">📹 أنت</p>
        <video id="local-video" autoplay playsinline muted></video>

        <p class="video-name">👤 الطرف الآخر</p>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="controls">
        <button id="toggle-mic" class="btn btn-mute">🎤 كتم الصوت</button>
        <button id="toggle-video" class="btn btn-mute">📷 إيقاف الكاميرا</button>
        <button id="switch-camera" class="btn btn-mute">🔄 تبديل الكاميرا</button>
        <button id="fullscreen-remote" class="btn">🖥️ تكبير الشاشة</button>
        <button id="end-call" class="btn">📞 إنهاء المكالمة</button>
    </div>

    <div id="chat-container">
        <h3>💬 الرسائل</h3>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="اكتب رسالتك...">
            <button id="send-message" class="btn">إرسال</button>
        </div>
    </div>

    <script>
    // دالة الانضمام باستخدام رقم الغرفة
    function joinRoomByNumber() {
        const roomId = document.getElementById('room-id-input').value.trim();
        if (roomId) {
            window.location.search = '?room=' + roomId;
        } else {
            alert('الرجاء كتابة رقم الغرفة أولاً');
        }
    }

    // إظهار رقم الغرفة الحالية في الأعلى من الرابط
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room');
        if (!room) {
            // إنشاء رقم غرفة عشوائي مكون من 4 أرقام إذا لم تكن موجودة
            room = Math.floor(1000 + Math.random() * 9000).toString();
            window.history.replaceState({}, '', '?room=' + room);
        }
        document.getElementById('current-room-id').innerText = room;
    });
    </script>

    <footer class="footer">
        <hr>
        <p>🇾🇪 تصميم وتطوير: <strong>أمين النزيلي</strong></p>
        <small>© 2026 جميع الحقوق محفوظة</small>
    </footer>

</body>
</html>
