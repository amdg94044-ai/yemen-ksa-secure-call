<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- السماح بالتكبير الحر بالإصبع دون أي قيود من المتصفح -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اتصال آمن ومباشر</title>
    <style>
        /* إعادة ضبط عامة مرنة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* تفعيل التمرير الحر والكامل عمودياً وأفقياً عند التكبير */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: block; 
            min-height: 100vh;
            overflow-y: auto !important; 
            overflow-x: auto !important; 
            -webkit-overflow-scrolling: touch; 
        }

        header {
            background-color: #1f1f1f;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #292929;
            position: sticky; 
            top: 0;
            z-index: 100;
        }

        #status-message {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            margin: 15px auto;
            width: fit-content;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        /* حاوية مرنة تترتب عمودياً لتسهيل سحب الشاشة وتحريكها */
        #video-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            width: 100%;
        }

        /* تنسيق مرن للفيديو يمنع تجمد الأبعاد ويسمح بالتكبير */
        video {
            width: 100%;
            max-width: 480px; 
            height: auto; 
            aspect-ratio: 4 / 3; 
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        #local-video {
            transform: scaleX(-1); /* ميزة المرآة لكاميرتك المحلية */
        }

        #remote-video {
            transform: none; /* فيديو الطرف الآخر */
        }

        /* أزرار التحكم تتحرك بشكل طبيعي في أسفل المحتوى وتدعم التكبير */
        #controls {
            background-color: #1f1f1f;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 15px;
            border-top: 2px solid #292929;
            margin-top: 30px;
            width: 100%;
        }

        .btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #b81d24;
        }

        .btn-mute {
            background-color: #333333;
        }
    </style>
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <header>🔒 اتصال مباشر آمن ومستقل</header>
    
    <div id="status-message">جاري تجهيز الاتصال المحلي...</div>

    <div id="video-grid">
        <!-- الفيديو الخاص بك -->
        <video id="local-video" autoplay playsinline muted></video>
        <!-- تم إعادة إضافة عنصر فيديو الطرف الآخر هنا ليعمل الاتصال فوراً وبدون مشاكل -->
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="controls">
        <button id="toggle-mic" class="btn btn-mute">كتم الصوت</button>
        <button id="toggle-video" class="btn btn-mute">إيقاف الكاميرا</button>
        <button id="end-call" class="btn">إنهاء المكالمة</button>
    </div>

</body>
</html>
